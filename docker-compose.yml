services:
  postgres:
    image: postgres:16-alpine
    container_name: performance-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: performance
      POSTGRES_PASSWORD: performance
      POSTGRES_DB: performance
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
